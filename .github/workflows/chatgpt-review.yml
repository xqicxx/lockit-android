name: '🔎 ChatGPT Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Get PR diff'
        id: diff
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          DIFF=$(gh pr diff "$PR_NUM" --repo "${{ github.repository }}")
          # Truncate if too large (OpenAI token limit considerations)
          MAX_CHARS=60000
          if [ ${#DIFF} -gt $MAX_CHARS ]; then
            DIFF="${DIFF:0:$MAX_CHARS}...[truncated]"
          fi
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: 'Get PR title and description'
        id: pr_info
        run: |
          echo "title<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.title || 'N/A' }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "${{ github.event.pull_request.body || 'N/A' }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 'ChatGPT Code Review'
        id: review
        env:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          PR_TITLE: '${{ steps.pr_info.outputs.title }}'
          PR_BODY: '${{ steps.pr_info.outputs.body }}'
          PR_DIFF: '${{ steps.diff.outputs.diff }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'
        run: |
          # Build the prompt
          PROMPT="You are a senior Android/Kotlin code reviewer. Review the following pull request and provide constructive feedback.

          Focus on:
          1. **Bugs & Logic Errors** - incorrect behavior, edge cases
          2. **Security Issues** - potential vulnerabilities, unsafe patterns
          3. **Performance** - inefficient code, unnecessary allocations
          4. **Code Quality** - readability, maintainability, naming
          5. **Best Practices** - Kotlin idioms, Compose patterns, Android conventions
          6. **Architecture** - layering, separation of concerns

          Skip obvious formatting/style issues. Be concise and actionable.

          PR Title: $PR_TITLE
          PR Description: $PR_BODY
          Additional Context: $ADDITIONAL_CONTEXT

          Here is the diff:
          \`\`\`diff
          $PR_DIFF
          \`\`\`

          Format your review as a markdown comment. If there are no significant issues, say 'Looks good to me! No major issues found.'
          "

          # Call OpenAI API
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": "You are a helpful code reviewer."},
                {"role": "user", "content": "'"$PROMPT"'"}
              ],
              "max_tokens": 4000,
              "temperature": 0.3
            }')

          # Extract the review text
          REVIEW=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print(f'ERROR: {data[\"error\"][\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print(data['choices'][0]['message']['content'])
          ")

          if [ $? -ne 0 ]; then
            echo "Failed to get review from ChatGPT"
            exit 1
          fi

          echo "review<<REVIEW_EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "REVIEW_EOF" >> $GITHUB_OUTPUT

      - name: 'Post Review Comment'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ github.event.pull_request.number }}'
          REVIEW: '${{ steps.review.outputs.review }}'
          REPOSITORY: '${{ github.repository }}'
        run: |
          gh pr comment "$ISSUE_NUMBER" \
            --repo "$REPOSITORY" \
            --body "## 🤖 ChatGPT Code Review

          $REVIEW

          ---
          *This review was generated by ChatGPT (gpt-4o).*"
